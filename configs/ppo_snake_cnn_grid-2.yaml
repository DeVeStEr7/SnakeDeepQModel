## PPO + CNN (grid obs) config
## - Actor: CNN branch (grid input)
## - Critic: CriticV (CNN branch) to support grid input
exp_name: "ppo_snake_cnn_grid"
seed: 0

## Environment
env_name: "snake"
snake_obs_mode: "grid"
render: false

## SnakeEnv params
snake_grid_size: 12
snake_tile_px: 20
snake_fps: 10
snake_max_steps: 300
snake_reward_apple: 10.0
snake_reward_death: -2.0
snake_step_penalty: -0.005
snake_allow_reverse: false
snake_walls_channel: true
snake_distance_reward_scale: 0.05

## PPO hyperparams
gamma: 0.99
lam: 0.95
T: 256
max_episodes: 3000
goal_mean_100_reward: 30.0

pi_lr: 3.0e-4
vf_lr: 1.0e-3
entropy_weight: 0.02
entropy_decay: 0.9995
entropy_min: 0.002

policy_epochs: 5
value_epochs: 5
minibatch_size: 64

## Actor network (CNN branch for grid obs)
actor_hidden_size: 128
actor_cnn_feat: 256

## Critic network: CriticV uses CNN branch for grid obs
critic_type: "v"
critic_hidden: 128
critic_cnn_feat: 256

